<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Singgah</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9805/9805578.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* PERBAIKAN 1: Ubah background agar sama dengan aplikasi (#f1f5f9) agar tidak kelihatan batasnya */
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #f1f5f9; /* Diubah dari biru tua menjadi abu-abu terang */
      font-family: 'Segoe UI', sans-serif; 
      overflow: hidden; 
    }
    
    .container { 
      width: 100%; 
      height: 100vh; /* Gunakan 100vh untuk tinggi viewport */
      /* PERBAIKAN 2: Gunakan properti dinamic height untuk HP agar tidak ada sisa */
      height: -webkit-fill-available; 
      display: flex; 
      flex-direction: column; 
    }
    
    .iframe-container { 
      flex: 1; 
      width: 100%; 
      height: 100%; 
      position: relative; 
      overflow: hidden; /* Cegah scroll di container luar */
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #f1f5f9; /* Samakan dengan body */
    }
    
    .loading { 
      position: fixed; /* Gunakan fixed agar menutupi layar */
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: white; /* Background putih bersih saat loading */
      color: #1e293b;
      z-index: 9999; 
    }
    
    .spinner { 
      border: 4px solid rgba(0,0,0,0.1); 
      border-radius: 50%; 
      border-top: 4px solid #4361ee; /* Warna primary aplikasi */
      width: 40px; 
      height: 40px; 
      animation: spin 1s linear infinite; 
      margin: 0 auto 15px; 
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading, Sabarrrrrr...</p>
    </div>
    <div class="iframe-container">
      <iframe id="appFrame" src="" allow="fullscreen; camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </div>

  <script>
    // URL Google Apps Script Anda
    const APP_URL = "https://script.google.com/macros/s/AKfycbwMX8O1hZpUlV4rCXKczut2GMt2rKQZj_48BHJEYDBE0_vFCsK2OeRLD_IBaNpeaVmaUw/exec";
    
    const appFrame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    
    function loadApp() {
      loading.style.display = 'flex';
      
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      let targetUrl = APP_URL;
      
      if (id) {
        if (targetUrl.indexOf('?') !== -1) {
             targetUrl += "&id=" + id;
        } else {
             targetUrl += "?id=" + id;
        }
      }
      
      appFrame.src = targetUrl;
    }
    
    appFrame.addEventListener('load', function() {
      loading.style.display = 'none';
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
 
</body>
</html>
